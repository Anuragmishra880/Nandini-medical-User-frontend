<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft shadow for subtle depth -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f3b7a"/>
    </linearGradient>
  </defs>

  <!-- Background transparent -->

  <!-- Green rounded cross -->
  <g transform="translate(120,80)" filter="url(#softShadow)">
    <!-- vertical bar -->
    <rect x="70" y="0" width="100" height="240" rx="24" ry="24" fill="url(#greenGrad)"/>
    <!-- horizontal bar -->
    <rect x="0" y="70" width="240" height="100" rx="24" ry="24" fill="url(#greenGrad)"/>
    <!-- thin stroke outline -->
    <rect x="70" y="0" width="100" height="240" rx="24" ry="24" fill="none" stroke="#0b6b3a" stroke-width="2"/>
    <rect x="0" y="70" width="240" height="100" rx="24" ry="24" fill="none" stroke="#0b6b3a" stroke-width="2"/>
  </g>

  <!-- Brand text -->
  <g transform="translate(420,120)" fill="url(#blueGrad)">
    <text x="0" y="70" font-family="serif" font-weight="700" font-size="92" letter-spacing="6">NANDINI</text>
    <text x="4" y="150" font-family="serif" font-weight="600" font-size="52" letter-spacing="8">MEDICAL HALL</text>
  </g>
</svg>
